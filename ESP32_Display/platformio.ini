; PlatformIO configuration for Waveshare ESP32-S3-Touch-LCD-4.3
;
; Notes:
;   - The Waveshare board uses an ESP32-S3-WROOM-1 N16R8 (16 MB flash, 8 MB PSRAM).
;   - Display: 800x480 RGB parallel, no controller IC — driven directly by
;     ESP32-S3 LCD_CAM peripheral via esp_lcd_panel_rgb.
;   - Touch: GT911 over I2C (addr 0x14 or 0x5D depending on RST/INT pin levels at boot).
;   - UART link to STM32 uses GPIO 15 (TX) / GPIO 16 (RX) on the expansion header.
;     These are free; DO NOT use GPIO 17/18 — those are LCD blue-data pins.

[env:waveshare_esp32s3_lcd_43]
platform = espressif32@^6.6.0
board    = esp32-s3-devkitc-1
framework = arduino

board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.flash_size   = 16MB
board_build.psram_type   = opi
board_build.arduino.memory_type = qio_opi

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include

lib_deps =
    lvgl/lvgl@^8.3.11
    ; GT911 touch driver from Espressif's esp_lcd_touch family.
    ; Pulled in as a managed-component via the espressif Arduino core.
    https://github.com/espressif/esp-bsp/raw/master/components/lcd_touch/esp_lcd_touch_gt911

monitor_speed = 115200
upload_speed  = 921600

; If the Waveshare-specific example you import requires the IO expander
; (PCA9554/TCA9554) for LCD reset / backlight enable, add the relevant
; library here, e.g.:
;     extkbasel/PCA9554@^1.0.0
